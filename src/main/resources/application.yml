spring:
  application:
    name: ai-ops-agent
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: 0.2}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
