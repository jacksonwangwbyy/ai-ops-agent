spring:
  application:
    name: ai-ops-agent
  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: 0.2
    retry:
      max-attempts: 2
      backoff:
        initial-interval: 1s
        multiplier: 2
        max-interval: 5s

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
